name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m
          skip-cache: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install LLVM and Clang for eBPF
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-libc-dev

      - name: Generate eBPF objects
        run: go generate ./...

      - name: Build (amd64)
        run: GOOS=linux GOARCH=amd64 go build -o bin/ebpf-nat-amd64 main.go

      - name: Build (arm64)
        run: GOOS=linux GOARCH=arm64 go build -o bin/ebpf-nat-arm64 main.go

      - name: Upload eBPF generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-generated
          path: internal/bpf/*.o
          retention-days: 1

  unit-test:
    name: Unit Test (eBPF)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build eBPF builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ebpf
          tags: ebpf-nat-builder:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit tests in privileged container
        run: |
          docker run --rm --privileged \
            -v /sys/kernel/debug:/sys/kernel/debug \
            -v $(go env GOMODCACHE):/go/pkg/mod \
            -v $(go env GOCACHE):/root/.cache/go-build \
            -v ${{ github.workspace }}:/app -w /app \
            ebpf-nat-builder:latest \
            go test -v -count=1 ./...

  integration-test:
    name: Integration Test (NAT Connectivity)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build eBPF builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ebpf
          tags: ebpf-nat-builder:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration tests in privileged container
        run: |
          docker run --rm --privileged \
            -v /sys/kernel/debug:/sys/kernel/debug \
            -v $(go env GOMODCACHE):/go/pkg/mod \
            -v $(go env GOCACHE):/root/.cache/go-build \
            -v ${{ github.workspace }}:/app -w /app \
            ebpf-nat-builder:latest \
            go test -v -count=1 ./internal/nat -run TestNATConnectivity
